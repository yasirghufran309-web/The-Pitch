[build]
  publish = "."

# No build command needed — this is a static HTML/CSS/JS site

# Redirect rules (optional, for single-page app routing)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Headers for better caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
