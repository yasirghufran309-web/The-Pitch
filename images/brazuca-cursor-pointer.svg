<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Brazuca 2014 FIFA World Cup Ball - Pointer Cursor (glowing green) -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="14.5" fill="#f5f5f0" stroke="#00e676" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Green swirl panel -->
  <path d="M8,6 Q12,10 10,16 Q8,20 12,24" fill="none" stroke="#00e676" stroke-width="3" stroke-linecap="round"/>
  <!-- Blue swirl panel -->
  <path d="M24,6 Q20,10 22,16 Q24,20 20,24" fill="none" stroke="#0072bc" stroke-width="3" stroke-linecap="round"/>
  <!-- Orange/Red accent swirl -->
  <path d="M6,14 Q10,12 16,10 Q22,8 26,12" fill="none" stroke="#f15a29" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Yellow accent -->
  <path d="M6,20 Q10,22 16,22 Q22,22 26,18" fill="none" stroke="#ffc20e" stroke-width="2" stroke-linecap="round"/>
  <!-- Dark panel lines -->
  <path d="M14,4 Q16,8 14,12" fill="none" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M18,20 Q16,24 18,28" fill="none" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Subtle highlight -->
  <ellipse cx="12" cy="10" rx="3" ry="2" fill="rgba(255,255,255,0.3)" transform="rotate(-20 12 10)"/>
</svg>
